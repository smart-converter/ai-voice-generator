<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Showcase</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; text-align: center; padding: 20px; background: #f0f2f5; color: #1c1e21; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); max-width: 400px; margin: 0 auto; }
        .voice-box { margin-bottom: 20px; text-align: left; background: #f8f9fa; padding: 15px; border-radius: 10px; border: 1px solid #ddd; }
        label { font-weight: bold; font-size: 14px; color: #555; display: block; margin-bottom: 8px; }
        audio { width: 100%; height: 35px; }
        .btn { display: inline-block; background: #000; color: #fff; padding: 15px 30px; border-radius: 30px; text-decoration: none; font-weight: bold; margin-top: 10px; width: 80%; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🎙️ Realistic AI Voices</h2>
        <p>Experience the power of ElevenLabs</p>

        <div class="voice-box">
            <label>1. Male Voice (Adam)</label>
            <audio controls><source src="adam.mp3" type="audio/mpeg"></audio>
        </div>

        <div class="voice-box">
            <label>2. Female Voice (Rachel)</label>
            <audio controls><source src="rachel.mp3" type="audio/mpeg"></audio>
        </div>

        <div class="voice-box">
            <label>3. Cheerful Voice (Bella)</label>
            <audio controls><source src="bella.mp3" type="audio/mpeg"></audio>
        </div>

        <a href="https://try.elevenlabs.io/gbjvlcndkh9n" class="btn">Get Started for Free</a>
    </div>
</body>
</html>
